version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studybuddies
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/studybuddies
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3001:3000"

  frontend:
    build: ./frontend
    environment:
      VITE_BACKEND_URL: http://localhost:3001
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
